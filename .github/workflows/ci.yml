name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    # Full OS × Node matrix: shardmind installs as a global CLI and must
    # run on whatever the user's vault lives on. Windows coverage caught
    # the CRLF merge regression Copilot flagged on PR #48; keep it first-class.
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        # Use bash on all three runners so the same step commands work
        # (Windows runners have git-bash pre-installed).
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        # Node 22+ matches obsidian-mind's requirement (hook TS strip
        # via --experimental-strip-types, stable in 22.6+). Node 18 hit
        # EOL April 2025; Node 20 EOL April 2026. Keep the matrix
        # aligned with the flagship shard's floor.
        node-version: [22, 24]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - run: npm ci
      - run: npm run typecheck
      # Build before test: the E2E suite (tests/e2e/) spawns dist/cli.js as
      # a subprocess. Without a fresh build, those tests would fail with a
      # cryptic "Cannot find module 'dist/cli.js'" before any assertion
      # runs. The E2E harness has its own build-once guard as a fallback
      # for local dev, but CI runs a hermetic install so we rebuild here.
      - run: npm run build
      - run: npm test
