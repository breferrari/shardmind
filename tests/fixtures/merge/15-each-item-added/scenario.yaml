name: "_each iterator gains a new item"
description: >
  The values for the _each iterator grew by one. The template is unchanged.
  The new item should produce a new file rendered from the template.
  Orchestration fixture: actual-file.md is the file for the newly-added item
  (currently absent on disk). Expected: create.

ownership_before: null
user_edited: false
template_changed: false
values_changed: true
conflict_expected: false
new_file: true
each_iterator_add: true
iterator_key: "skills"
new_item_slug: "mentoring"
expected_action: create

values:
  old:
    skills:
      - { name: "Leadership", slug: "leadership" }
      - { name: "Coding", slug: "coding" }
  new:
    skills:
      - { name: "Leadership", slug: "leadership" }
      - { name: "Coding", slug: "coding" }
      - { name: "Mentoring", slug: "mentoring" }
